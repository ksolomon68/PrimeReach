<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline – CaltransBizConnect</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#005A8C">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.75rem;
      color: #005A8C;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      color: #555;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: #005A8C;
      color: #fff;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      border: none;
    }
    .btn:hover { background: #004470; }
    .logo {
      width: 120px;
      margin-bottom: 2rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <img src="assets/caltrans-logo.png" alt="CaltransBizConnect" class="logo">
  <div class="icon" aria-hidden="true">📡</div>
  <h1>You're Offline</h1>
  <p>It looks like you've lost your internet connection. Some pages may still be available from your cache. Please check your connection and try again.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
  <script src="js/pwa.js"></script>
</body>
</html>
