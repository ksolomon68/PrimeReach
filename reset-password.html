<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description"
        content="Set a new password for your CaltransBizConnect account to regain access to your dashboard.">
    <title>Reset Password - CaltransBizConnect</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#005A8C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BizConnect">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="stylesheet" href="css/design-system.css?v=1774549569000">
    <link rel="stylesheet" href="css/main.css?v=1774549569000">
  <link rel="stylesheet" href="css/accessibility-widget.css?v=1774549569000">
    <style>
        .login-container {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-2xl) var(--container-padding);
        }

        .login-box {
            background-color: var(--color-bg-primary);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            padding: var(--space-2xl);
            width: 100%;
            max-width: 450px;
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--space-xl);
        }

        .login-header h1 {
            font-size: var(--font-size-2xl);
            margin-bottom: var(--space-sm);
        }
    </style>
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="site-header" role="banner">
        <div class="container">
            <a href="index.html" class="site-logo">
                <img src="images/caltrans-logo.png" alt="Caltrans">
            </a>
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false"><span></span></button>
            <nav class="main-nav" role="navigation" aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="for-small-businesses.html">Small Businesses</a></li>
          <li><a href="for-prime-contractors.html">Prime Contractors</a></li>
          <li><a href="opportunities.html">Opportunities</a></li>
          <li><a href="how-it-works.html">How It Works</a></li>
          <li><a href="resources.html">Resources</a></li>
          <li><a href="faq.html">FAQ</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="login.html" class="btn btn-secondary btn-small">Log In</a></li>
        </ul>
      </nav>
        </div>
    </header>

    <main id="main-content">
        <div class="login-container">
            <div class="login-box">
                <div class="login-header">
                    <h1>Reset Your Password</h1>
                    <p class="text-muted">Enter a new password for your account.</p>
                </div>

                <form id="resetPasswordForm" novalidate>
                    <div class="form-group">
                        <label for="password" class="required">New Password</label>
                        <input type="password" id="password" name="password" required autocomplete="new-password">
                        <span class="form-error" role="alert"></span>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="required">Confirm New Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required
                            autocomplete="new-password">
                        <span class="form-error" role="alert"></span>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 California Department of Transportation. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/config.js?v=1774549569000"></script>
  <script src="js/main.js?v=1774549569000"></script>
  <script src="js/accessibility-widget.js?v=1774549569000"></script>
  <script>
    const box = document.querySelector('.login-box');
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    // Verify token on page load
    async function verifyToken() {
      if (!token) {
        box.innerHTML = '<div style="text-align:center;padding:var(--space-xl);"><p style="color:var(--color-error);">Invalid or missing reset link.</p><a href="forgot-password.html" class="btn btn-primary" style="margin-top:var(--space-md);">Request New Link</a></div>';
        return;
      }
      try {
        const res = await fetch(window.APP_CONFIG.API_URL + '/password-reset/verify-token?token=' + encodeURIComponent(token));
        const data = await res.json();
        if (!data.valid) {
          box.innerHTML = '<div style="text-align:center;padding:var(--space-xl);"><p style="color:var(--color-error);">' + (data.message || 'This reset link is invalid or has expired.') + '</p><a href="forgot-password.html" class="btn btn-primary" style="margin-top:var(--space-md);">Request New Link</a></div>';
        }
      } catch {
        box.innerHTML = '<div style="text-align:center;padding:var(--space-xl);"><p style="color:var(--color-error);">Unable to verify your reset link. Please try again.</p><a href="forgot-password.html" class="btn btn-primary" style="margin-top:var(--space-md);">Request New Link</a></div>';
      }
    }

    // Handle form submission
    const form = document.getElementById('resetPasswordForm');
    const submitBtn = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pwInput = document.getElementById('password');
      const confirmInput = document.getElementById('confirmPassword');
      const pwError = pwInput.nextElementSibling;
      const confirmError = confirmInput.nextElementSibling;
      pwError.textContent = '';
      confirmError.textContent = '';

      const newPassword = pwInput.value;
      const confirm = confirmInput.value;

      if (newPassword.length < 8) {
        pwError.textContent = 'Password must be at least 8 characters.';
        return;
      }
      if (newPassword !== confirm) {
        confirmError.textContent = 'Passwords do not match.';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Resetting...';

      try {
        const res = await fetch(window.APP_CONFIG.API_URL + '/password-reset/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json();
        if (data.success) {
          box.innerHTML = '<div style="text-align:center;padding:var(--space-xl);"><div style="padding:var(--space-md);background:#e8f5e9;border:1px solid #4caf50;border-radius:var(--border-radius-md);color:#1b5e20;margin-bottom:var(--space-lg);" role="alert"><strong>Password updated!</strong><br>You can now log in with your new password.</div><a href="login.html" class="btn btn-primary">Log In</a></div>';
        } else {
          pwError.textContent = data.message || 'An error occurred. Please request a new reset link.';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
        }
      } catch {
        pwError.textContent = 'Unable to connect. Please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    });

    verifyToken();
  </script>
  <script src="js/pwa.js?v=1774549569000"></script>
</body>

</html>
