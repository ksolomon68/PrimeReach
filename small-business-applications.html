<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications - CaltransBizConnect</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/dashboard-new.css">
    <link rel="stylesheet" href="css/dashboard-common.css">
    <style>
        /* Local overrides if needed */
    </style>
  <link rel="stylesheet" href="css/accessibility-widget.css">
</head>

<body class="dashboard-v2">
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <aside class="sidebar" id="sidebar"></aside>

    <div class="dashboard-container">
        <header class="header-top" id="header-top"></header>

        <!-- Main Content -->
        <main id="main-content" class="main-content">

            <!-- Hero Section -->
            <section class="hero-section">
                <div class="hero-content">
                    <div class="hero-welcome">
                        <h1 style="color: white; margin-bottom: var(--space-sm); font-size: var(--font-size-2xl);">My
                            Applications</h1>
                        <p style="color: rgba(255,255,255,0.9); font-size: var(--font-size-md);">Track the status of
                            your applications and manage your bidding activity.</p>
                    </div>
                </div>
            </section>

            <!-- Applications List -->
            <section class="content-card">
                <h3>Submitted Applications</h3>
                <div id="applicationsList">
                    <div style="text-align: center; padding: 2rem; color: var(--text-muted);">
                        Loading applications...
                    </div>
                </div>
            </section>

        </main>
        <footer id="site-footer" class="site-footer"></footer>
    </div>

    <!-- Application Modal -->
    <div id="applicationModal" class="modal-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div class="modal-content enhanced-card"
            style="background: white; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; position: relative;">
            <button onclick="closeApplicationModal()"
                style="position: absolute; top: var(--space-md); right: var(--space-md); border: none; background: none; font-size: 1.5rem; cursor: pointer;">&times;</button>

            <h2 id="modalTitle" style="margin-bottom: var(--space-md); color: var(--color-primary);">Apply for
                Opportunity</h2>

            <div id="modalLoading" style="text-align: center; padding: var(--space-xl); display: none;">
                <div class="spinner"></div>
                <p>Loading details...</p>
            </div>

            <form id="applicationForm" onsubmit="handleApplicationSubmit(event)">
                <input type="hidden" id="opportunityId" name="opportunityId">

                <div class="form-group" style="margin-bottom: var(--space-md);">
                    <label style="display: block; font-weight: 600; margin-bottom: var(--space-xs);">Opportunity</label>
                    <div id="opportunityTitle"
                        style="padding: var(--space-sm); background: var(--color-bg-secondary); border-radius: var(--border-radius-sm);">
                        Loading...</div>
                </div>

                <div class="form-group" style="margin-bottom: var(--space-md);">
                    <label for="coverLetter"
                        style="display: block; font-weight: 600; margin-bottom: var(--space-xs);">Cover Letter</label>
                    <textarea id="coverLetter" name="coverLetter" required rows="5"
                        style="width: 100%; padding: var(--space-sm); border: 1px solid var(--color-border-dark); border-radius: var(--border-radius-sm);"
                        placeholder="Explain why your company is the best fit for this opportunity..."></textarea>
                </div>

                <div class="form-group" style="margin-bottom: var(--space-lg);">
                    <label style="display: flex; align-items: flex-start; gap: var(--space-sm);">
                        <input type="checkbox" required name="terms" style="margin-top: 4px;">
                        <span style="font-size: 0.9rem; color: var(--text-muted);">I certify that the information
                            provided is accurate and I agree to the terms of service.</span>
                    </label>
                </div>

                <div class="form-actions" style="text-align: right;">
                    <button type="button" class="btn btn-outline" onclick="closeApplicationModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit Application</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils/data-resilience.js"></script>
    <script src="js/components/navigation.js"></script>
    <script>
        // Status display mapping
        const STATUS_LABELS = {
            pending:      { label: 'Pending',       cls: 'badge-warning' },
            under_review: { label: 'Under Review',  cls: 'badge-info' },
            awarded:      { label: 'Awarded',        cls: 'badge-success' },
            declined:     { label: 'Declined',       cls: 'badge-error' },
            rejected:     { label: 'Declined',       cls: 'badge-error' },
            approved:     { label: 'Awarded',        cls: 'badge-success' }
        };

        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(() => {
                Navigation.init('small_business');
                loadApplications();
                checkApplyParam();
            }, 50);
        });

        async function checkApplyParam() {
            const params = new URLSearchParams(window.location.search);
            const applyId = params.get('apply');
            if (applyId) openApplicationModal(applyId);
        }

        async function openApplicationModal(id) {
            const modal = document.getElementById('applicationModal');
            const form  = document.getElementById('applicationForm');
            const loading = document.getElementById('modalLoading');
            const oppTitleEl = document.getElementById('opportunityTitle');
            const oppIdInput = document.getElementById('opportunityId');

            modal.style.display = 'flex';
            form.style.display = 'none';
            loading.style.display = 'block';

            try {
                const opp = await DataService.fetch(`/opportunities/${id}`);
                if (opp && opp.id) {
                    oppTitleEl.textContent = opp.title;
                    oppIdInput.value = opp.id;
                    form.style.display = 'block';
                    loading.style.display = 'none';
                } else {
                    alert('Opportunity not found.');
                    closeApplicationModal();
                }
            } catch (err) {
                console.error('Error loading opportunity for application:', err);
                alert('Failed to load opportunity details.');
                closeApplicationModal();
            }
        }

        function closeApplicationModal() {
            document.getElementById('applicationModal').style.display = 'none';
            const url = new URL(window.location);
            url.searchParams.delete('apply');
            window.history.pushState({}, '', url);
        }

        async function handleApplicationSubmit(e) {
            e.preventDefault();
            const user = Auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }

            const formData = new FormData(e.target);
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.textContent = 'Submitting…';
            submitBtn.disabled = true;

            try {
                const oppId = formData.get('opportunityId');
                await DataService.fetch('/applications', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        opportunityId: oppId,
                        smallBusinessId: user.id,
                        notes: formData.get('coverLetter')
                    })
                });

                alert('Application submitted successfully!');
                closeApplicationModal();
                loadApplications();
            } catch (err) {
                const msg = err.message || '';
                if (msg.toLowerCase().includes('already')) {
                    alert('You have already applied to this opportunity.');
                } else {
                    alert('Failed to submit application. Please try again.');
                }
                console.error('Application submit error:', err);
            } finally {
                submitBtn.textContent = 'Submit Application';
                submitBtn.disabled = false;
            }
        }

        async function loadApplications() {
            const user = Auth.getUser();
            if (!user) return;
            try {
                const apps = await DataService.fetch(`/applications/small-business/${user.id}`).catch(() => []);
                renderApplications(Array.isArray(apps) ? apps : []);
            } catch (err) {
                console.error('Failed to load applications:', err);
                renderApplications([]);
            }
        }

        function renderApplications(applications) {
            const listEl = document.getElementById('applicationsList');

            if (!applications.length) {
                listEl.innerHTML = `
                    <div style="text-align:center;padding:2rem;color:var(--text-muted);">
                        <p>You haven't submitted any applications yet.</p>
                        <a href="search-opportunities.html" class="btn btn-primary" style="margin-top:1rem;">Browse Opportunities</a>
                    </div>`;
                return;
            }

            listEl.innerHTML = applications.map(app => {
                const st = STATUS_LABELS[app.status] || { label: app.status || 'Pending', cls: 'badge-secondary' };
                const title = app.project_title || app.opportunity_title || 'Untitled Opportunity';
                const district = app.district_name || (app.district_id ? `District ${app.district_id}` : '');
                const prime = app.prime_contractor_name || '';
                const date = app.applied_date || app.applied_at;
                const isPending = (app.status || 'pending') === 'pending';

                return `
                <div class="enhanced-card" style="margin-bottom:var(--space-lg);border-left:4px solid var(--color-primary);">
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--space-md);">
                        <div style="flex:1;">
                            <h3 style="margin:0 0 var(--space-xs) 0;color:var(--color-primary);font-size:var(--font-size-xl);font-weight:600;">
                                ${title}
                            </h3>
                            ${prime ? `<div style="font-size:0.85rem;color:var(--text-muted);margin-bottom:var(--space-xs);">Prime: ${prime}</div>` : ''}
                            <div style="display:flex;flex-wrap:wrap;gap:var(--space-sm);margin-top:var(--space-sm);">
                                <span class="badge ${st.cls}">${st.label}</span>
                                ${district ? `<span class="badge badge-info">${district}</span>` : ''}
                            </div>
                        </div>
                        <div style="text-align:right;flex-shrink:0;margin-left:1rem;">
                            <div style="font-size:0.8rem;color:var(--text-muted);">Applied</div>
                            <div style="font-weight:600;">${date ? new Date(date).toLocaleDateString() : '—'}</div>
                        </div>
                    </div>
                    <div style="display:flex;gap:var(--space-sm);justify-content:flex-end;flex-wrap:wrap;">
                        <button class="btn btn-small btn-outline" onclick="viewOpportunity('${app.opportunity_id}')">View Opportunity</button>
                        ${isPending ? `<button class="btn btn-small btn-outline" style="color:var(--color-error);border-color:var(--color-error);" onclick="withdrawApplication('${app.id}', this)">Withdraw</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        window.withdrawApplication = async function(appId, btn) {
            if (!confirm('Withdraw this application? This cannot be undone.')) return;
            btn.disabled = true;
            btn.textContent = 'Withdrawing…';
            try {
                await DataService.fetch(`/applications/${appId}`, { method: 'DELETE' });
                loadApplications();
            } catch (err) {
                alert('Could not withdraw application. ' + (err.message || ''));
                btn.disabled = false;
                btn.textContent = 'Withdraw';
            }
        };

        window.viewOpportunity = function(opportunityId) {
            window.location.href = `opportunity-details.html?id=${opportunityId}`;
        };
    </script>

  <script src="js/accessibility-widget.js"></script>
</body>

</html>
