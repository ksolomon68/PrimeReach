<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Prime Contractor Profile - View details about the contracting primeContractor.">
    <title>Prime Contractor Profile - CaltransBizConnect</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#005A8C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BizConnect">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="stylesheet" href="css/design-system.css?v=1774553331000">
    <link rel="stylesheet" href="css/dashboard-new.css?v=1774549569000">
    <link rel="stylesheet" href="css/dashboard-common.css?v=1774549569000">
    <style>
        .hero-section {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
            color: white;
            padding: var(--space-2xl) var(--space-xl);
            border-radius: var(--border-radius-lg);
            margin-bottom: var(--space-xl);
            position: relative;
        }

        .profile-card {
            background: var(--card-bg);
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--color-border-light);
            padding: var(--space-2xl);
            margin-bottom: var(--space-xl);
        }

        .agency-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-xl);
            margin-bottom: var(--space-2xl);
            background: var(--color-bg-secondary);
            padding: var(--space-xl);
            border-radius: var(--border-radius-md);
        }

        .meta-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .meta-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--color-primary);
        }

        .opportunity-card {
            border: 1px solid var(--color-border-light);
            border-radius: var(--border-radius-md);
            padding: var(--space-lg);
            margin-bottom: var(--space-md);
            transition: all 0.2s;
            cursor: pointer;
        }

        .opportunity-card:hover {
            border-color: var(--color-primary);
            box-shadow: var(--shadow-md);
        }
    </style>
  <link rel="stylesheet" href="css/accessibility-widget.css?v=1774549569000">
</head>

<body class="dashboard-v2">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="dashboard-container">
        <header class="header-top" id="header-top"></header>

        <main id="main-content" class="main-content">
            <a href="javascript:history.back()"
                style="display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; margin-bottom: var(--space-lg); font-weight: 500;">
                &larr; Back
            </a>

            <section class="hero-section">
                <div class="hero-content">
                    <h1 class="page-title" id="primeContractorName">Prime Contractor Name</h1>
                    <p id="primeContractorTagline">District Office</p>
                </div>
            </section>

            <div class="profile-card">
                <h3>About the Prime Contractor</h3>
                <p id="primeContractorDescription" style="line-height: 1.6; color: var(--text-secondary);">
                    Loading agency information...
                </p>

                <div class="agency-meta">
                    <div class="meta-item">
                        <span class="meta-label">District</span>
                        <div id="primeContractorDistrict" class="meta-value">--</div>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Contact Person</span>
                        <div id="primeContractorContact" class="meta-value">--</div>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Total Postings</span>
                        <div id="primeContractorPostCount" class="meta-value">--</div>
                    </div>
                </div>

                <h3 style="margin-top: var(--space-xl); margin-bottom: var(--space-lg);">Active Opportunities</h3>
                <div id="activeOppsList">
                    <p style="color: var(--text-muted);">Scanning for active postings...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/config.js?v=1774549569000"></script>
    <script src="js/auth.js?v=1774549569000"></script>
    <script src="js/utils/data-resilience.js?v=1774549569000"></script>
    <script src="js/components/navigation.js?v=1774549569000"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = Auth.getUser();
            if (user) Navigation.init(user.type);

            const params = new URLSearchParams(window.location.search);
            const primeContractorId = params.get('id');

            if (!primeContractorId) {
                alert('Small Business ID required');
                history.back();
                return;
            }

            if (user && user.type === 'agency' && String(user.id) !== String(primeContractorId)) {
                alert('Access Denied: Prime Contractors cannot view other Prime Contractor profiles.');
                window.location.href = 'dashboard-prime-contractor.html';
                return;
            }

            await loadPrimeContractorProfile(primeContractorId);
        });

        async function loadPrimeContractorProfile(id) {
            try {
                const primeContractor = await DataService.fetch(`/users/${id}`);
                const allOpps = await DataService.fetch('/opportunities');

                // Filter opportunities posted by this agency
                const primeContractorOpps = allOpps.filter(o => o.posted_by == id || o.postedBy == id);

                const orgName = primeContractor.organization_name || primeContractor.business_name || primeContractor.contact_name || 'Prime Contractor Office';
                const districtLabel = Array.isArray(primeContractor.districts) && primeContractor.districts.length > 0
                    ? 'District ' + primeContractor.districts.join(', ')
                    : primeContractor.district ? `District ${primeContractor.district}` : 'Statewide';

                document.getElementById('primeContractorName').textContent = orgName;
                document.getElementById('primeContractorTagline').textContent = districtLabel;
                document.getElementById('primeContractorDescription').textContent = primeContractor.business_description || primeContractor.description || 'This agency manages various transportation projects and contracting opportunities for the California Department of Transportation.';

                document.getElementById('primeContractorDistrict').textContent = districtLabel;
                document.getElementById('primeContractorContact').textContent = primeContractor.contact_name || 'Procurement Officer';
                document.getElementById('primeContractorPostCount').textContent = primeContractorOpps.length;

                const oppsList = document.getElementById('activeOppsList');
                if (primeContractorOpps.length === 0) {
                    oppsList.innerHTML = '<p style="color: var(--text-muted);">No active opportunities at this time.</p>';
                } else {
                    oppsList.innerHTML = '';
                    primeContractorOpps.forEach(opp => {
                        const div = document.createElement('div');
                        div.className = 'opportunity-card';
                        div.onclick = () => window.location.href = `opportunity-details.html?id=${opp.id}`;
                        div.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <h4 style="margin: 0; color: var(--color-primary);">${opp.title}</h4>
                                <span class="badge badge-primary">${opp.category || 'General'}</span>
                            </div>
                            <div style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-muted);">
                                Due: ${opp.due_date || 'TBD'} | Value: ${opp.estimated_value || 'TBD'}
                            </div>
                        `;
                        oppsList.appendChild(div);
                    });
                }

            } catch (error) {
                console.error('Error loading agency:', error);
                alert('Failed to load agency profile.');
            }
        }
    </script>
  <script src="js/accessibility-widget.js?v=1774549569000"></script>
  <script src="js/pwa.js?v=1774549569000"></script>
</body>

</html>
