<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Applications - CaltransBizConnect</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/dashboard-new.css">
    <link rel="stylesheet" href="css/dashboard-common.css">
    <style>
        .small-business-list-container {
            margin-top: var(--space-xl);
        }

        .small-business-item-card {
            background: var(--card-bg);
            border: 1px solid var(--color-border-light);
            border-radius: var(--border-radius-lg);
            padding: var(--space-xl);
            margin-bottom: var(--space-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .small-business-item-card:hover {
            transform: translateX(8px);
            border-color: var(--color-primary);
            box-shadow: var(--shadow-md);
        }

        .small-business-info-main h3 {
            margin: 0 0 var(--space-xs) 0;
            color: var(--color-primary);
        }

        .small-business-meta {
            display: flex;
            gap: var(--space-md);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .small-business-actions {
            display: flex;
            gap: var(--space-sm);
        }

        @media (max-width: 768px) {
            .small-business-item-card {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-md);
            }

            .small-business-actions {
                width: 100%;
            }

            .small-business-actions button {
                flex: 1;
            }
        }
    </style>
  <link rel="stylesheet" href="css/accessibility-widget.css">
</head>

<body class="dashboard-v2">
    <aside class="sidebar" id="sidebar"></aside>

    <div class="dashboard-container">
        <header class="header-top" id="header-top"></header>

        <main id="main-content" class="main-content">
            <section class="hero-section">
                <div class="hero-content">
                    <div class="hero-welcome">
                        <h1 id="opportunityTitle">Applications</h1>
                        <p>Review submittals for this contracting opportunity</p>
                    </div>
                </div>
            </section>

            <div class="small-business-list-container">
                <div id="appliedSmallBusinessesList">
                    <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
                        Loading applications...
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils/data-resilience.js"></script>
    <script src="js/components/navigation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const opportunityId = params.get('id');
            const user = Auth.getUser();

            if (!opportunityId || !user || user.type !== 'prime_contractor') {
                location.href = 'manage-opportunities.html';
                return;
            }

            Navigation.init('prime_contractor');
            loadAppliedSmallBusinesses(opportunityId);
        });

        async function loadAppliedSmallBusinesses(id) {
            const listEl = document.getElementById('appliedSmallBusinessesList');
            try {
                // Fetch opportunity details for the title
                const opp = await DataService.fetch(`/opportunities/${id}`);
                if (opp) {
                    document.getElementById('opportunityTitle').textContent = `Applications: ${opp.title}`;
                }

                // Fetch applications
                const apps = await DataService.fetch(`/applications/opportunity/${id}`);
                renderSmallBusinesses(apps);
            } catch (error) {
                console.error('Error loading applications:', error);
                listEl.innerHTML = '<div style="color: var(--color-error); text-align: center; padding: 2rem;">Error loading applications.</div>';
            }
        }

        function renderSmallBusinesses(apps) {
            const listEl = document.getElementById('appliedSmallBusinessesList');
            if (!apps || apps.length === 0) {
                listEl.innerHTML = '<div class="content-card" style="text-align: center; padding: 3rem;">No applications received yet.</div>';
                return;
            }

            listEl.innerHTML = apps.map(app => `
                <div class="small-business-item-card">
                    <div class="small-business-info-main">
                        <h3>${app.business_name || app.business_name || 'Anonymous Small Business'}</h3>
                        <div class="small-business-meta">
                            <span>👤 ${app.contact_name || 'N/A'}</span>
                            <span>📅 Applied: ${new Date(app.applied_date).toLocaleDateString()}</span>
                            <span>📋 Status: ${app.status}</span>
                        </div>
                        <div style="margin-top: 0.5rem; font-size: 0.85rem; color: var(--text-muted);">
                            ${app.notes ? `Note: "${app.notes}"` : 'No submittal notes provided.'}
                        </div>
                    </div>
                    <div class="small-business-actions">
                        <button class="btn btn-outline btn-small" onclick="location.href='small-business-profile.html?id=${app.small_business_id}'">View Profile</button>
                    </div>
                </div>
            `).join('');
        }

    </script>
  <script src="js/accessibility-widget.js"></script>
</body>

</html>
